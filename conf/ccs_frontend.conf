# A hg25ccs frontend nginx configja a közös stackben.
#
# Az eredeti hg25ccs/ccs_frontend/conf/default.conf-hoz képest: itt NINCS TLS
# és NINCS HTTP->HTTPS redirect. A tanúsítványt és az átirányítást a Traefik
# intézi, ide már sima HTTP érkezik a docker hálózaton. A 443-as portot ez a
# konténer nem is nyitja ki.

server {
    listen       80;
    listen  [::]:80;

    # A Host alapján a Traefik már szűrt (hg25ccs.eu), ide csak a neki
    # szánt forgalom jut el.
    server_name _;
    server_tokens off;

    # Statikus frontend.
    location / {
        root /var/www/html;
        index index.html;
    }

    # A /api kérések a backendhez mennek a ccs_internal hálózaton. A
    # ccs_backend csak ezen a proxyn keresztül érhető el.
    location ^~ /api/ {
        proxy_pass http://ccs_backend:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # A séma a Traefiktől jön: kifelé https, ide befelé http. A backend
        # így a valódi, publikus sémát látja.
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;

        # Preflight (OPTIONS) kérések kezelése
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Content-Length' '0' always;
            return 204;
        }
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /var/www/html;
    }
}
