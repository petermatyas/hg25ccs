# HTTP: Let's Encrypt ACME challenge kiszolgálása + átirányítás HTTPS-re.
server {
    listen       80;
    listen  [::]:80;

    server_name hg25ccs.hu www.hg25ccs.hu;
    server_tokens off;

    # A certbot webroot plugin ide teszi a challenge fájlokat.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Minden más HTTP kérést HTTPS-re irányítunk.
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS: a tényleges kiszolgálás.
server {
    listen       443 ssl;
    listen  [::]:443 ssl;
    http2 on;

    server_name hg25ccs.hu www.hg25ccs.hu;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/hg25ccs.hu/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/hg25ccs.hu/privkey.pem;

    # Ajánlott Let's Encrypt SSL beállítások.
    ssl_session_cache shared:le_nginx_SSL:10m;
    ssl_session_timeout 1440m;
    ssl_session_tickets off;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Statikus frontend.
    location / {
        root /var/www/html;
        index index.html;
    }

    # A /api kérések a backendhez mennek (belső hálózaton). A ccs_backend
    # így nem közvetlenül publikus, csak ezen a proxyn keresztül érhető el.
    location ^~ /api/ {
        proxy_pass http://ccs_backend:8800;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Preflight (OPTIONS) kérések kezelése
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization' always;
            add_header 'Content-Length' '0' always;
            return 204;
        }
    }

    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /var/www/html;
    }
}
