<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HG25CCS</title>
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script src="js/jquery-3.7.1.js"></script>


  </head>
  <body>
    <div id="header"></div>

    <!-- Bejelentkezés -->
    <div id="loginGate" class="container my-5" style="display:none; max-width:420px;">
        <h3>Admin bejelentkezés</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label" for="loginUsername">Felhasználónév</label>
                <input type="text" class="form-control" id="loginUsername" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="loginPassword">Jelszó</label>
                <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required>
            </div>
            <p id="loginError" style="color:#FF0000;"></p>
            <button type="submit" class="btn btn-primary">Belépés</button>
        </form>
    </div>

    <!-- Csak bejelentkezés után látható tartalom -->
    <div id="adminContent" style="display:none;">
    <div class="container">

        <div class="d-flex justify-content-end my-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="logoutBtn">Kijelentkezés</button>
        </div>

        <div class="row">
            <!--<label for="callsignId" class="form-label">hívójel</label>-->
            <input type="text" class="form-control" id="callsignId" placeholder="hívójel"> 
            <button type="button" class="btn btn-primary col-2" id="callsignQueryBtnId">Lekérdez</button>

        </div>
        <div class="row">
            <table class="table">
                <thead>
                    <tr>
                        <th scope="col">Idő</th>
                        <th scope="col">Sáv</th>
                        <th scope="col">Mód</th>
                        <th scope="col">Qth</th>
                        <th scope="col">Küldött RST</th>
                        <th scope="col">Kapott RST</th>
                        <th scope="col">Hívójel</th>
                        <th scope="col">Feltöltés ideje</th>
                        <th scope="col">Fájlnév</th>
                        
                    </tr>
                </thead>
                <tbody id="logTableBodyId">
                </tbody>
            </table>



        </div>
    </div>
    </div><!-- /adminContent -->




    


    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
	<script src="js/jquery-3.7.1.js"></script>
	
	
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/callsign_query.js"></script>


  </body>
</html>
