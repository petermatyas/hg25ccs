<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HG25CCS</title>
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-4Q6Gf2aSP4eDXB8Miphtr37CMZZQ5oXLH2yaXMJ2w8e2ZtHTl7GptT4jmndRuHDT" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.6/dist/js/bootstrap.bundle.min.js" integrity="sha384-j1CDi7MgGQ12Z7Qab0qlWQ/Qqz24Gc6BM0thvEMVjHnfYGF0rmFCozFSxQBxwHKO" crossorigin="anonymous"></script>
    <script src="js/jquery-3.7.1.js"></script>


  </head>
  <body>
    <div id="header"></div>

    <!-- Bejelentkezés -->
    <div id="loginGate" class="container my-5" style="display:none; max-width:420px;">
        <h3>Admin bejelentkezés</h3>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label" for="loginUsername">Felhasználónév</label>
                <input type="text" class="form-control" id="loginUsername" autocomplete="username" required>
            </div>
            <div class="mb-3">
                <label class="form-label" for="loginPassword">Jelszó</label>
                <input type="password" class="form-control" id="loginPassword" autocomplete="current-password" required>
            </div>
            <p id="loginError" style="color:#FF0000;"></p>
            <button type="submit" class="btn btn-primary">Belépés</button>
        </form>
    </div>

    <!-- Csak bejelentkezés után látható tartalom -->
    <div id="adminContent" style="display:none;">
    <div class="container">

        <div class="d-flex justify-content-end my-2">
            <button type="button" class="btn btn-outline-secondary btn-sm" id="logoutBtn">Kijelentkezés</button>
        </div>

        <div class="row">
            <h4>Statisztika</h4>
            <div class="col">
                <p>Összes QSO: <span id="nr_of_qso"></span></p>
                <p>Részvevők: <span id="nr_of_participants"></span></p>
                <p>1 érvényes QSO: <span id="1_valid_qso"></span></p>
                <p>2 érvényes QSO: <span id="2_valid_qso"></span></p>
                <p>Diplomát szerzett: <span id="nr_of_valid_diploma"></span></p>
                <p>Letöltött diplomák: <span id="downloaded_diploma_nr"></span></p>
            </div>   
            <div class="col">
                <table class="table table-sm"id="statBandModeTableId">
                    <thead>
                        <tr>
                            <th scope="col"></th>
                            <th scope="col">70cm</th>
                            <th scope="col">2m</th>
                            <th scope="col">4m</th>
                            <th scope="col">6m</th>
                            <th scope="col">10m</th>
                            <th scope="col">12m</th>
                            <th scope="col">15m</th>
                            <th scope="col">17m</th>
                            <th scope="col">20m</th>
                            <th scope="col">30m</th>
                            <th scope="col">40m</th>
                            <th scope="col">60m</th>
                            <th scope="col">80m</th>
                            <th scope="col">160m</th>
                            <th scope="col">egyéb</th>
                            <th scope="col">hiba</th>
                            
                        </tr>
                    </thead>
                    <tbody>
                    </tbody>
                </table>
            </div> 
           
        </div>

        <div class="row">
            <!--1 qso:
            <p id="1qso"></p>
            1 qso:-->
            Diploma:
            <p id="diploma"></p>
        </div>

    </div>
    </div><!-- /adminContent -->





    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/popper.min.js"></script>
    <script src="js/bootstrap.min.js"></script>
	<script src="js/jquery-3.7.1.js"></script>
	
	
    <script src="js/common.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/statistics.js"></script>
    

  </body>
</html>
